name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'lib/**'
      - 'android/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.3'
          channel: stable
          cache: true

      - name: Restore release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret missing. Add it in GitHub repo settings."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release-keystore.jks
          ls -la android/app/release-keystore.jks

      - name: Flutter pub get
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      - name: Report build size
        run: |
          APK=build/app/outputs/flutter-apk/app-release.apk
          echo "## APK build complete" >> $GITHUB_STEP_SUMMARY
          echo "- Size: $(du -h $APK | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "- SHA256: $(sha256sum $APK | cut -d' ' -f1)" >> $GITHUB_STEP_SUMMARY
